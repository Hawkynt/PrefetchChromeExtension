name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  version:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: v
        run: echo "version=$(perl .github/workflows/scripts/version.pl)" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ needs.version.outputs.version }}
      release-kind: release
      changelog-flag: --release ${{ github.ref_name }}

  publish:
    needs: [version, build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: "${{ needs.build.outputs.artifact-name }}", path: dist }
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          body: |
            ## Prefetch Extension v${{ needs.version.outputs.version }}

            Chrome extension (Manifest V3). Install by:
            1. Download the zip below and extract.
            2. Open `chrome://extensions`, enable Developer mode.
            3. Click "Load unpacked" and select the extracted folder.
          files: dist/*.zip
          generate_release_notes: true
